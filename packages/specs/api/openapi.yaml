openapi: 3.0.3
info:
  title: Chromedia Talent Intelligence API (Slice 1)
  version: 0.1.0
servers:
  - url: http://localhost:4000/api
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: chromedia_access
  schemas:
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    Candidate:
      type: object
      required:
        [id, name, role, technologies, expectedSalary, available, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        technologies:
          type: string
        expectedSalary:
          type: string
        available:
          type: string
        status:
          type: string
          enum: [Active, Inactive, Pending]
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CandidateQueryResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer
    SkillCapabilities:
      type: object
      required: ['Entry Level', 'Mid Level', 'Senior Level', 'Senior Lead Level']
      properties:
        Entry Level:
          type: array
          items: { type: string }
        Mid Level:
          type: array
          items: { type: string }
        Senior Level:
          type: array
          items: { type: string }
        Senior Lead Level:
          type: array
          items: { type: string }
    Skill:
      type: object
      required: [name, capabilities, displayOrder]
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string, nullable: true }
        description: { type: string, nullable: true }
        displayOrder: { type: integer }
        capabilities:
          $ref: '#/components/schemas/SkillCapabilities'
    SkillCategory:
      type: object
      required: [name, displayOrder, skills]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string, nullable: true }
        description: { type: string, nullable: true }
        displayOrder: { type: integer }
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
    SkillsTaxonomy:
      type: object
      required: [categories]
      properties:
        taxonomyVersion: { type: string }
        updatedAt: { type: string, format: date-time }
        categories:
          type: array
          items:
            $ref: '#/components/schemas/SkillCategory'
    SharedProfile:
      type: object
      required:
        [
          id,
          shareToken,
          candidateId,
          candidateName,
          candidateRole,
          sharedWithName,
          sharedWithEmail,
          rateLabel,
          expirationDate,
          sharedAt,
          accessCount,
          status
        ]
      properties:
        id: { type: string }
        shareToken: { type: string }
        candidateId: { type: string }
        candidateName: { type: string }
        candidateRole: { type: string }
        sharedWithName: { type: string }
        sharedWithEmail: { type: string, format: email }
        rateLabel: { type: string }
        expirationDate: { type: string, format: date-time }
        sharedAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }
        accessCount: { type: integer }
        lastAccessedAt: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [Active, Expired, Revoked] }
    SharedProfileQueryResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SharedProfile'
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }
paths:
  /health:
    get:
      responses:
        '200':
          description: healthy

  /auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: login success
        '401':
          description: invalid credentials

  /auth/session:
    get:
      responses:
        '200':
          description: active session or unauthenticated payload

  /auth/logout:
    post:
      responses:
        '200':
          description: logged out

  /dashboard/summary:
    get:
      security:
        - cookieAuth: []
      responses:
        '200':
          description: dashboard summary metrics

  /candidates/query:
    get:
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: role
          schema: { type: string }
        - in: query
          name: available
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: sortBy
          schema: { type: string }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc] }
      responses:
        '200':
          description: candidate list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateQueryResponse'

  /candidates:
    post:
      security:
        - cookieAuth: []
      responses:
        '201':
          description: created

  /candidates/{id}:
    get:
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: found }
        '404': { description: not found }
    put:
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: updated }
    delete:
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: deleted }

  /candidate-links:
    post:
      security:
        - cookieAuth: []
      responses:
        '201':
          description: invite token generated

  /skills:
    get:
      security:
        - cookieAuth: []
      responses:
        '200':
          description: full skills taxonomy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillsTaxonomy'
    put:
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillsTaxonomy'
      responses:
        '200':
          description: taxonomy persisted

  /skills/query:
    get:
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: scope
          schema: { type: string, enum: [categories, skills] }
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: sortBy
          schema: { type: string }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: scoped taxonomy list

  /shared-profiles:
    get:
      security:
        - cookieAuth: []
      responses:
        '200':
          description: shared profiles list
    post:
      security:
        - cookieAuth: []
      responses:
        '201':
          description: shared profile created

  /shared-profiles/query:
    get:
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [Active, Expired, Revoked] }
        - in: query
          name: sortBy
          schema:
            {
              type: string,
              enum:
                [
                  candidateName,
                  sharedWithName,
                  rateLabel,
                  expirationDate,
                  accessCount,
                  sharedAt,
                  updatedAt
                ]
            }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: paginated shared profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedProfileQueryResponse'

  /shared-profiles/{id}:
    put:
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: shared profile updated

  /shared-profiles/{id}/revoke:
    post:
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: shared profile revoked

  /public-shares/{token}:
    get:
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: public share metadata
        '404':
          description: invalid or unavailable token

  /public-shares/{token}/candidate:
    get:
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: public candidate payload
        '404':
          description: invalid or unavailable token
